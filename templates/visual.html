<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Visual Learning</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* layout */
.container {
    max-width: 900px;
    margin: auto;
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 30px;
}

/* card */
.card {
    padding: 25px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    transition: 0.3s ease-out;
}

.card:hover {
    transform: translateY(-5px);
}

/* text */
h2 {
    margin-bottom: 10px;
}

/* inputs */
textarea, input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

/* button */
button {
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #d4af37;
    cursor: pointer;
}

/* flowchart */
.flowchart {
    margin-top: 15px;
}

.step {
    background: rgba(255,255,255,0.15);
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    text-align: center;
}

.arrow {
    text-align: center;
    font-size: 20px;
}

/* summary */
.summary-box {
    margin-top: 10px;
    padding: 15px;
    border-radius: 10px;
}

/* color options */
.color-options {
    display: flex;
    gap: 12px;
    margin-top: 10px;
}

.color-options label {
    width: 25px;
    height: 25px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid white;
}

.c1 { background: #1abc9c; }
.c2 { background: #3498db; }
.c3 { background: #9b59b6; }
.c4 { background: #e67e22; }

/* chat */
.chat-box {
    height: 180px;
    overflow-y: auto;
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1 style="text-align:center;margin-top:20px;">👀 Visual Learning</h1>

<div class="container">

<!-- 1️⃣ TIPS -->
<div class="card">
<h2>🎯 Visual Learning Tips</h2>
<p>Visual learners understand better through images and patterns.</p>
<ul>
<li>🎨 Use colors to highlight ideas</li>
<li>🧠 Build mind maps</li>
<li>📊 Prefer diagrams</li>
<li>🎥 Watch visual videos</li>
</ul>
</div>

<!-- 2️⃣ FLOWCHART -->
<div class="card">
<h2>📊 Flowchart Generator</h2>

<input id="flowInput" placeholder="Enter topic (e.g. Water Cycle)">
<button onclick="generateFlow()">Generate</button>

<div id="flowchart" class="flowchart"></div>
</div>

<!-- 3️⃣ SUMMARIZER -->
<div class="card">
<h2>🧠 Summarizer</h2>

<textarea id="textInput" placeholder="Paste text..."></textarea>
<button onclick="summarize()">Summarize</button>

<div class="color-options">
<label class="c1" onclick="setColor('#1abc9c')"></label>
<label class="c2" onclick="setColor('#3498db')"></label>
<label class="c3" onclick="setColor('#9b59b6')"></label>
<label class="c4" onclick="setColor('#e67e22')"></label>
</div>

<div id="summary" class="summary-box"></div>
</div>

<!-- 4️⃣ CHAT -->
<div class="card">
<h2>🤖 Chat Assistant</h2>

<div id="chat" class="chat-box"></div>

<input id="chatInput" placeholder="Ask something...">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<script>

/* FLOWCHART */
async function generateFlow(){
    let topic = document.getElementById("flowInput").value;

    let res = await fetch("/flowchart", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({topic})
    });

    let data = await res.json();
    let text = data.diagram;

    let steps = text.split(/->|\\n/);

    let html = "";

    steps.forEach((s, i) => {
        if(s.trim() !== ""){
            html += `<div class="step">${s}</div>`;
            if(i < steps.length - 1){
                html += `<div class="arrow">⬇️</div>`;
            }
        }
    });

    document.getElementById("flowchart").innerHTML = html;
}

/* SUMMARIZER */
async function summarize(){
    let text = document.getElementById("textInput").value;

    let res = await fetch("/summarize", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({text})
    });

    let data = await res.json();
    document.getElementById("summary").innerText = data.summary;
}

/* COLOR */
function setColor(color){
    document.getElementById("summary").style.background = color;
}

/* CHAT */
async function sendMsg(){
    let input = document.getElementById("chatInput");
    let chat = document.getElementById("chat");

    let msg = input.value;

    chat.innerHTML += `<div>🧑 ${msg}</div>`;
    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message:msg})
    });

    let data = await res.json();
    chat.innerHTML += `<div>🤖 ${data.reply}</div>`;
}
</script>

</body>
</html>
